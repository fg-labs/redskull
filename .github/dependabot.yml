version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - rust
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(ci)"
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        update-types:
          - minor
          - patch
