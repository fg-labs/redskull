[workspace]
# Update the changelog from Conventional Commits when preparing a release.
changelog_update = true
# Update dependencies with `cargo update` in the release PR.
dependencies_update = true
# Label applied to the release PR.
pr_labels = ["release"]
# Verify semver compatibility with cargo-semver-checks before releasing.
semver_check = true
# Publishing (crates.io upload, git tag, and GitHub release) is handled by the
# `publish` job in .github/workflows/publish.yml so that we publish via
# crates.io Trusted Publishing (OIDC). release-plz only opens and maintains the
# release PR, so disable the release-side actions here.
publish = false
git_tag_enable = false
git_release_enable = false
