<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="100%" height="100%" viewBox="0 0 1200 800" version="1.1" xmlns="http://www.w3.org/2000/svg" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:1.41421;">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="100%" stop-color="#aa1111"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffdd44"/>
      <stop offset="80%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </radialGradient>
    <radialGradient id="clawGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ee2222"/>
      <stop offset="100%" stop-color="#991111"/>
    </radialGradient>
  </defs>

  <!-- =============== BACKGROUND CLAWS (behind body) =============== -->
  <!-- Reuse Ferris's original claw paths, recolored red -->
  <g transform="matrix(1,0,0,1,917.896,244.679)">
    <path d="M0,232.466C0,232.466 53.179,230 123.032,159.004L132.93,137.025C132.93,137.025 24.513,29.177 193.048,-45.266C193.048,-45.266 178.293,-21.154 182.622,72.006C182.622,72.006 233.437,54.357 248.336,-27.934C248.336,-27.934 322.456,69.79 167.834,161.443C167.834,161.443 95.294,277.732 -6.971,266.593L0,232.466Z" style="fill:url(#clawGrad);fill-rule:nonzero;"/>
  </g>
  <g transform="matrix(1,0,0,1,269.796,270.778)">
    <path d="M0,190.741C-0.667,190.741 -1.321,190.79 -1.973,190.842C-28.207,184.871 -101.946,165.657 -121.437,134.479C-121.437,134.479 -22.21,21.607 -177.297,-50.54L-159.24,74.338C-159.24,74.338 -207.049,42.389 -217.366,-27.008C-217.366,-27.008 -333.789,57.486 -165.982,138.466C-165.982,138.466 -150.762,195.653 -4.633,241.281L-4.526,240.846C-3.055,241.118 -1.549,241.281 0,241.281C13.808,241.281 25.003,229.969 25.003,216.01C25.003,202.054 13.808,190.741 0,190.741" style="fill:url(#clawGrad);fill-rule:nonzero;"/>
  </g>

  <!-- =============== MAIN BODY (Ferris shape, red) =============== -->
  <!-- Original Ferris body with legs/antennae, recolored dark red -->
  <g transform="matrix(1,0,0,1,1009.4,506.362)">
    <path d="M0,-7.203L-12.072,-32.209C-12.009,-33.156 -11.961,-34.107 -11.961,-35.062C-11.961,-63.408 -41.439,-89.533 -91.03,-110.451L-91.03,-93.058C-95.866,-94.977 -100.901,-96.845 -106.147,-98.651L-106.147,-106.759C-177.021,-132.319 -282.53,-148.537 -400.388,-148.537C-503.361,-148.537 -596.917,-136.157 -666.179,-115.983L-666.179,-87.737L-666.181,-87.737L-666.181,-121.925C-737.141,-99.375 -781.135,-68.048 -781.135,-33.41C-781.135,-27.95 -780.034,-22.572 -777.918,-17.297L-785.146,-4.43C-785.146,-4.43 -790.938,3.082 -780.74,18.932C-771.746,32.909 -726.692,87.617 -702.913,116.267C-692.699,130.954 -685.772,140.001 -685.167,139.126C-684.212,137.74 -691.518,110.165 -711.802,78.703C-721.268,61.808 -732.57,39.42 -739.356,22.884C-720.414,34.874 -609.126,90.913 -382.124,90.685C-150.13,90.453 -47.009,17.834 -35.691,7.948C-39.646,23.837 -53.159,55.981 -63.936,78.586C-81.642,110.917 -88.056,139.064 -87.232,140.456C-86.708,141.334 -80.667,132.015 -71.756,116.913C-51.025,87.37 -11.739,30.974 -3.889,16.608C5.007,0.323 0,-7.203 0,-7.203" style="fill:#8b1a00;fill-rule:nonzero;"/>
  </g>

  <!-- Body shell (Ferris torso), recolored red -->
  <g transform="matrix(1,0,0,1,1079.49,294.885)">
    <path d="M0,204.135L-79.343,145.689C-80.088,143.089 -80.833,140.488 -81.603,137.908L-55.541,100.154C-52.881,96.314 -52.345,91.322 -54.072,86.943C-55.803,82.585 -59.587,79.461 -64.062,78.696L-108.128,71.217C-109.837,67.732 -111.626,64.301 -113.422,60.898L-94.907,18.51C-93.004,14.193 -93.402,9.175 -95.929,5.256C-98.446,1.319 -102.715,-0.981 -107.267,-0.802L-151.991,0.823C-154.306,-2.193 -156.658,-5.18 -159.058,-8.114L-148.78,-53.546C-147.738,-58.158 -149.054,-62.989 -152.267,-66.34C-155.462,-69.679 -160.105,-71.062 -164.52,-69.979L-208.082,-59.27C-210.902,-61.763 -213.77,-64.223 -216.67,-66.635L-215.103,-113.276C-214.935,-117.997 -217.136,-122.484 -220.915,-125.105C-224.692,-127.741 -229.485,-128.137 -233.616,-126.179L-274.254,-106.858C-277.527,-108.736 -280.819,-110.595 -284.146,-112.395L-291.327,-158.356C-292.056,-163.012 -295.051,-166.968 -299.246,-168.774C-303.431,-170.591 -308.222,-170.002 -311.894,-167.238L-348.126,-140.053C-351.695,-141.238 -355.279,-142.373 -358.905,-143.46L-374.522,-187.045C-376.11,-191.488 -379.772,-194.751 -384.238,-195.669C-388.688,-196.578 -393.266,-195.037 -396.352,-191.589L-426.851,-157.47C-430.536,-157.893 -434.228,-158.28 -437.927,-158.601L-461.476,-198.277C-463.86,-202.295 -468.073,-204.741 -472.615,-204.741C-477.144,-204.741 -481.365,-202.295 -483.733,-198.277L-507.288,-158.601C-510.989,-158.28 -514.696,-157.893 -518.376,-157.47L-548.875,-191.589C-551.965,-195.037 -556.559,-196.578 -560.997,-195.669C-565.457,-194.739 -569.125,-191.488 -570.704,-187.045L-586.333,-143.46C-589.954,-142.373 -593.538,-141.23 -597.113,-140.053L-633.333,-167.238C-637.016,-170.012 -641.811,-170.599 -646.001,-168.774C-650.182,-166.968 -653.189,-163.012 -653.914,-158.356L-661.1,-112.395C-664.422,-110.595 -667.714,-108.746 -670.995,-106.858L-711.629,-126.179C-715.756,-128.145 -720.574,-127.741 -724.333,-125.105C-728.106,-122.484 -730.313,-117.997 -730.143,-113.276L-728.581,-66.635C-731.475,-64.223 -734.337,-61.763 -737.172,-59.27L-780.726,-69.979C-785.149,-71.053 -789.788,-69.679 -792.991,-66.34C-796.212,-62.989 -797.517,-58.158 -796.482,-53.546L-786.225,-8.114C-788.603,-5.169 -790.958,-2.193 -793.267,0.823L-837.991,-0.802C-842.504,-0.937 -846.812,1.319 -849.334,5.256C-851.861,9.175 -852.244,14.193 -850.363,18.51L-831.835,60.898C-833.634,64.301 -835.421,67.732 -837.144,71.217L-881.207,78.696C-885.686,79.45 -889.459,82.572 -891.201,86.943C-892.929,91.322 -892.368,96.314 -889.727,100.154L-863.661,137.908C-863.862,138.575 -864.048,139.247 -864.248,139.916L-937.944,218.201C-937.944,218.201 -949.24,227.052 -932.797,247.855C-918.297,266.206 -843.846,338.951 -804.526,377.06C-787.92,396.408 -776.542,408.389 -775.354,407.353C-773.478,405.708 -783.326,370.506 -816.036,329.204C-841.252,292.148 -873.977,235.155 -866.303,228.586C-866.303,228.586 -857.574,217.505 -840.061,209.529C-839.42,210.041 -840.723,209.022 -840.061,209.529C-840.061,209.529 -470.466,380.02 -127.632,212.413C-88.468,205.388 -64.759,226.368 -64.759,226.368C-56.583,231.108 -77.755,289.712 -95.166,328.505C-118.845,372.555 -122.317,406.927 -120.31,408.119C-119.042,408.876 -110.427,395.766 -98.138,374.902C-67.814,332.649 -10.492,252.1 0,232.534C11.895,210.352 0,204.135 0,204.135" style="fill:url(#bodyGrad);fill-rule:nonzero;"/>
  </g>

  <!-- =============== SKULL FACE (replaces Ferris's eyes/mouth) =============== -->

  <!-- BROW RIDGES (separate arcs above each eye, both peak at y=348) -->
  <!-- Left eye brow (Ferris's left = viewer's right, eye top y=385) -->
  <path d="M670,365 Q710,348 758,360"
        fill="none" stroke="#4a0800" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- Right eye brow (Ferris's right = viewer's left, eye top y=374) -->
  <path d="M500,360 Q545,348 595,360"
        fill="none" stroke="#4a0800" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- LEFT EYE SOCKET — shifted up 25px -->
  <g transform="matrix(1,0,0,1,676.997,463.361)">
    <path d="M0,-78.192C0,-78.192 36.935,-118.635 73.871,-78.192C73.871,-78.192 102.893,-24.265 73.871,2.695C73.871,2.695 26.384,40.443 0,2.695C0,2.695 -31.658,-26.964 0,-78.192" style="fill:#1a0000;fill-rule:nonzero;"/>
  </g>
  <!-- Left eye glow -->
  <ellipse cx="714" cy="400" rx="24" ry="22" fill="url(#eyeGlow)"/>
  <ellipse cx="712" cy="395" rx="9" ry="8" fill="#fff" opacity="0.6"/>

  <!-- RIGHT EYE SOCKET — shifted up 25px -->
  <g transform="matrix(1,0,0,1,512.148,457.736)">
    <path d="M0,-83.609C0,-83.609 63.355,-111.661 80.648,-49.047C80.648,-49.047 98.762,23.933 28.618,28.052C28.618,28.052 -60.826,10.824 0,-83.609" style="fill:#1a0000;fill-rule:nonzero;"/>
  </g>
  <!-- Right eye glow -->
  <ellipse cx="543" cy="403" rx="24" ry="22" fill="url(#eyeGlow)"/>
  <ellipse cx="541" cy="398" rx="9" ry="8" fill="#fff" opacity="0.6"/>

  <!-- NOSE CAVITY (heart-shaped with septum, Grayskull style) -->
  <!-- Outer nasal opening — inverted heart shape -->
  <path d="M628,460 C618,462 604,472 606,488 C608,498 618,502 628,500
           C638,502 648,498 650,488 C652,472 638,462 628,460 Z"
        fill="#1a0000"/>
  <!-- Left nostril -->
  <ellipse cx="617" cy="482" rx="8" ry="10" fill="#0d0000" transform="rotate(-8,617,482)"/>
  <!-- Right nostril -->
  <ellipse cx="639" cy="482" rx="8" ry="10" fill="#0d0000" transform="rotate(8,639,482)"/>
  <!-- Septum (divider between nostrils) -->
  <line x1="628" y1="468" x2="628" y2="498" stroke="#8b1a00" stroke-width="3.5" opacity="0.9"/>

  <!-- MOUTH AND FANGS (Castle Grayskull style) -->
  <g transform="translate(9, -4)">
    <!-- Dark mouth void (large cave opening, behind teeth) -->
    <rect x="578" y="525" width="82" height="70" rx="4" fill="#0a0000"/>

    <!-- Stone steps at bottom of mouth (Grayskull drawbridge) -->
    <rect x="581" y="581" width="76" height="5" fill="#3d2a1e" stroke="#2a1a10" stroke-width="0.5"/>
    <rect x="584" y="574" width="70" height="5" fill="#352418" stroke="#2a1a10" stroke-width="0.5"/>
    <rect x="588" y="567" width="62" height="5" fill="#2d1e14" stroke="#2a1a10" stroke-width="0.5"/>

    <!-- Upper fangs — thick bulbous outer canines, short stubby inner teeth -->
    <g>
      <!-- Outer left canine (long, thick, bulbous) -->
      <path d="M560,509 C555,530 558,555 568,572
               C572,565 575,540 582,509 Z"
            fill="#f5f0e0" stroke="#bba888" stroke-width="1"/>
      <!-- Outer left shadow (3D shading — dark on right side) -->
      <ellipse cx="576" cy="535" rx="3" ry="16" fill="#000" opacity="0.25" transform="rotate(5,576,535)"/>
      <!-- Inner left (short, stubby, rounded bump) -->
      <path d="M588,509 C584,518 586,527 594,533
               C600,527 602,518 600,509 Z"
            fill="#f5f0e0" stroke="#bba888" stroke-width="1"/>
      <ellipse cx="597" cy="519" rx="2" ry="7" fill="#000" opacity="0.2"/>
      <!-- Center left (short, stubby) -->
      <path d="M606,509 C603,516 604,523 611,528
               C616,523 617,516 614,509 Z"
            fill="#faf5e8" stroke="#bba888" stroke-width="1"/>
      <ellipse cx="612" cy="517" rx="2" ry="5" fill="#000" opacity="0.2"/>
      <!-- Center right (mirror of center left) -->
      <path d="M632,509 C635,516 634,523 627,528
               C622,523 621,516 624,509 Z"
            fill="#faf5e8" stroke="#bba888" stroke-width="1"/>
      <ellipse cx="626" cy="517" rx="2" ry="5" fill="#000" opacity="0.2"/>
      <!-- Inner right (mirror of inner left) -->
      <path d="M650,509 C654,518 652,527 644,533
               C638,527 636,518 638,509 Z"
            fill="#f5f0e0" stroke="#bba888" stroke-width="1"/>
      <ellipse cx="641" cy="519" rx="2" ry="7" fill="#000" opacity="0.2"/>
      <!-- Outer right canine (mirror of outer left) -->
      <path d="M678,509 C683,530 680,555 670,572
               C666,565 663,540 656,509 Z"
            fill="#f5f0e0" stroke="#bba888" stroke-width="1"/>
      <!-- Outer right shadow (3D shading — dark on left side) -->
      <ellipse cx="662" cy="535" rx="3" ry="16" fill="#000" opacity="0.25" transform="rotate(-5,662,535)"/>
    </g>

    <!-- Lower teeth — small curved fangs flanking the staircase, pointing up -->
    <g>
      <!-- Left outer lower fang (curves outward left) -->
      <path d="M580,592 C574,580 572,568 585,560
               C582,570 586,582 588,592 Z"
            fill="#ece7d8" stroke="#bba888" stroke-width="1"/>
      <!-- Left inner lower fang (curves outward left) -->
      <path d="M597,592 C593,583 592,574 601,568
               C600,576 602,585 603,592 Z"
            fill="#ece7d8" stroke="#bba888" stroke-width="1"/>
      <!-- Right inner lower fang (mirror, curves outward right) -->
      <path d="M641,592 C645,583 646,574 637,568
               C638,576 636,585 635,592 Z"
            fill="#ece7d8" stroke="#bba888" stroke-width="1"/>
      <!-- Right outer lower fang (mirror, curves outward right) -->
      <path d="M658,592 C664,580 666,568 653,560
               C656,570 652,582 650,592 Z"
            fill="#ece7d8" stroke="#bba888" stroke-width="1"/>
    </g>
  </g>

  <!-- CHEEKBONE ACCENTS (Skeletor style, shifted up 25px) -->
  <!-- Left cheek -->
  <path d="M500,485 Q520,510 515,535 Q535,520 545,500 Q530,485 500,485 Z" fill="#770e00" opacity="0.45"/>
  <path d="M498,495 Q510,515 505,530" fill="none" stroke="#660a00" stroke-width="2" opacity="0.55"/>
  <!-- Right cheek -->
  <path d="M755,480 Q735,505 740,530 Q720,515 710,495 Q725,480 755,480 Z" fill="#770e00" opacity="0.45"/>
  <path d="M757,490 Q745,510 750,525" fill="none" stroke="#660a00" stroke-width="2" opacity="0.55"/>



  <!-- =============== TEXT =============== -->
  <text x="628" y="680" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="72" font-weight="bold" fill="#cc2222" stroke="#881111" stroke-width="1.5"
        letter-spacing="6">REDSKULL</text>
  <text x="628" y="720" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="20" font-weight="bold" fill="#992222" letter-spacing="3">conda recipes for Rust crates</text>
</svg>
